services:
  web:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: nox-examen-web
    restart: unless-stopped
    env_file:
      - ../.env.production
    environment:
      - PORT=3000
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
